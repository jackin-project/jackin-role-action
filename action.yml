name: 'Validate jackin Agent'
description: 'Validates a jackin agent repo against the project contract and runs an amd64 CI build check'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to the agent repo'
    required: false
    default: '.'
  jackin-version:
    description: 'Version of jackin-role to download. Defaults to the newest preview validator while jackin is experimental.'
    required: false
    default: 'latest-build'
  skip-build:
    description: 'Skip the Docker build step (validate only)'
    required: false
    default: 'false'
  registry-cache-image:
    description: >-
      Optional image whose registry build cache (<image>:buildcache-amd64,
      written by the publish workflow) is also used as cache-from for the CI
      build, so PR CI starts warm from the last published layers.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Download jackin-role
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        JACKIN_VERSION: ${{ inputs.jackin-version }}
      run: ${{ github.action_path }}/scripts/download-jackin-role.sh "$JACKIN_VERSION"

    - name: Lint Dockerfile
      if: inputs.skip-build != 'true'
      uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
      with:
        dockerfile: ${{ inputs.path }}/Dockerfile
        # DL3004: construct base image intentionally exposes sudo for dev containers.
        # Per-repo .hadolint.yaml can add further suppressions.
        ignore: DL3004
        failure-threshold: error
        config: ${{ inputs.path }}/.hadolint.yaml

    - name: Validate agent repo
      shell: bash
      env:
        AGENT_PATH: ${{ inputs.path }}
      run: jackin-role validate "$AGENT_PATH"

    - name: Set up Docker Buildx
      if: inputs.skip-build != 'true'
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Build Docker image (CI check, linux/amd64)
      if: inputs.skip-build != 'true'
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: ${{ inputs.path }}
        platforms: linux/amd64
        push: false
        load: true
        cache-from: |
          type=gha,scope=${{ github.repository }}-${{ inputs.path }}-linux-amd64
          ${{ inputs.registry-cache-image != '' && format('type=registry,ref={0}:buildcache-amd64', inputs.registry-cache-image) || '' }}
        cache-to: type=gha,scope=${{ github.repository }}-${{ inputs.path }}-linux-amd64,mode=max
        secrets: |
          github_token=${{ github.token }}
