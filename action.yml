name: 'Validate jackin Agent'
description: 'Validates a jackin agent repo against the project contract and builds the Docker image multi-platform'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to the agent repo'
    required: false
    default: '.'
  jackin-version:
    description: 'Version of jackin-validate to download. Defaults to the newest preview validator while jackin is experimental.'
    required: false
    default: 'latest-build'
  build-platforms:
    description: 'Comma-separated Docker platforms to build'
    required: false
    default: 'linux/amd64,linux/arm64'
  skip-build:
    description: 'Skip the Docker build step'
    required: false
    default: 'false'
  push:
    description: 'Push the built image to the registry. Requires image, registry-username, and registry-password.'
    required: false
    default: 'false'
  image:
    description: 'Full image name including registry (e.g. docker.io/org/image). Required when push is true.'
    required: false
    default: ''
  registry-username:
    description: 'Registry username for docker login. Required when push is true.'
    required: false
    default: ''
  registry-password:
    description: 'Registry password for docker login. Required when push is true.'
    required: false
    default: ''
  sign:
    description: 'Sign the pushed image with cosign keyless signing. Requires push to be true and id-token: write permission.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Download jackin-validate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        JACKIN_VERSION: ${{ inputs.jackin-version }}
      run: ${{ github.action_path }}/scripts/download-validator.sh "$JACKIN_VERSION"

    - name: Validate agent repo
      shell: bash
      env:
        AGENT_PATH: ${{ inputs.path }}
      run: jackin-validate "$AGENT_PATH"

    - name: Login to registry
      if: inputs.skip-build != 'true' && inputs.push == 'true' && inputs.registry-username != ''
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Set up QEMU
      if: inputs.skip-build != 'true'
      uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

    - name: Set up Docker Buildx
      if: inputs.skip-build != 'true'
      uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

    - name: Build Docker image
      if: inputs.skip-build != 'true'
      shell: bash
      env:
        AGENT_PATH: ${{ inputs.path }}
        BUILD_PLATFORMS: ${{ inputs.build-platforms }}
        IMAGE: ${{ inputs.image }}
        PUSH: ${{ inputs.push }}
      run: ${{ github.action_path }}/scripts/build-image.sh "$AGENT_PATH" "$BUILD_PLATFORMS"

    - name: Install cosign
      if: inputs.skip-build != 'true' && inputs.sign == 'true' && inputs.push == 'true'
      uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

    - name: Sign image
      if: inputs.skip-build != 'true' && inputs.sign == 'true' && inputs.push == 'true' && inputs.image != ''
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
      run: |
        short_sha="${GITHUB_SHA::7}"
        cosign sign --yes "${IMAGE}:latest" "${IMAGE}:${short_sha}"
