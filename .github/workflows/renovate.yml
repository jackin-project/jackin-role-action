name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Prepare Renovate workspace
        run: |
          sudo rm -rf "/tmp/renovate-${GITHUB_RUN_ID}"
          mkdir -p "/tmp/renovate-${GITHUB_RUN_ID}/cache"
          chmod -R 777 "/tmp/renovate-${GITHUB_RUN_ID}"

      - name: Cache Renovate repository cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/renovate-${{ github.run_id }}/cache
          key: renovate-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            renovate-${{ runner.os }}-

      - name: Allow Renovate container workspace writes
        run: chmod -R 777 "/tmp/renovate-${GITHUB_RUN_ID}"

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@dd5302ec17783b2fc721b19ae7209b57b1587765 # v46.1.17
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_BASE_DIR: /tmp/renovate-${{ github.run_id }}
          RENOVATE_REPOSITORY_CACHE: enabled
          # Pin the git author identity so the DCO sign-off trailer in
          # renovate.json::commitBody always matches the commit-author
          # email. DCO-2 requires the Signed-off-by email to equal the
          # commit-author email; without this pin, a change in Renovate's
          # default author would silently break DCO on every Renovate PR.
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@whitesourcesoftware.com>"
          LOG_LEVEL: debug

      - name: Fix Renovate cache ownership for save
        if: always()
        run: sudo chown -R "$(whoami)" "/tmp/renovate-${GITHUB_RUN_ID}" 2>/dev/null || true
